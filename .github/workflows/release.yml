name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的 tag（如 v0.2.0，必须已存在）'
        required: true
        type: string

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Create or reuse Release
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.eventName === 'workflow_dispatch'
              ? context.payload.inputs.tag
              : context.ref_name;
            if (!tag || tag === 'undefined') {
              core.setFailed(`Invalid tag: ${tag}. 请通过 push tag 触发，或在 workflow_dispatch 输入合法 tag。`);
              return;
            }
            // 如果该 tag 对应的 release 已存在（手动创建或上次构建遗留），直接复用，
            // 避免 'Validation Failed: already_exists' 错误。
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.info(`Reusing existing release #${data.id} for tag ${tag} (draft=${data.draft})`);
              return data.id;
            } catch (e) {
              if (e.status !== 404) throw e;
            }
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `KUI ${tag}`,
              body: 'See the assets to download and install this version.',
              draft: false,
              prerelease: false
            });
            core.info(`Created new release #${data.id} for tag ${tag}`);
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'KUI ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
